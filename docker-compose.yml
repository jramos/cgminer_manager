services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  monitor:
    image: ghcr.io/jramos/cgminer_monitor:latest
    depends_on: [mongo]
    environment:
      CGMINER_MONITOR_MONGO_URL: mongodb://mongo:27017/cgminer_monitor
      CGMINER_MONITOR_HTTP_HOST: 0.0.0.0
    volumes:
      - ./config/miners.yml:/app/config/miners.yml:ro

  manager:
    build: .
    depends_on: [monitor]
    ports: ['3000:3000']
    environment:
      CGMINER_MONITOR_URL: http://monitor:9292
      BIND: 0.0.0.0
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in your environment}
      # Admin routes require Basic Auth as of 1.3.0. This dev stack
      # defaults to the =off escape hatch (CSRF-only posture). Set
      # CGMINER_MANAGER_ADMIN_USER + CGMINER_MANAGER_ADMIN_PASSWORD to
      # engage the default-required gate — valid credentials also bypass
      # CSRF so scripts can curl admin routes. See MIGRATION.md#1.3.0.
      CGMINER_MANAGER_ADMIN_AUTH: ${CGMINER_MANAGER_ADMIN_AUTH:-off}
      CGMINER_MANAGER_ADMIN_USER: ${CGMINER_MANAGER_ADMIN_USER:-}
      CGMINER_MANAGER_ADMIN_PASSWORD: ${CGMINER_MANAGER_ADMIN_PASSWORD:-}
    volumes:
      - ./config/miners.yml:/app/config/miners.yml:ro

volumes:
  mongo_data:

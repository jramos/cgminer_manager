AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  Include:
    - '**/*.rb'
    - '**/*.gemspec'
    - 'bin/cgminer_manager'
    - 'Gemfile'
    - 'Rakefile'
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'app/**/*'
    - 'bin/**/*'
    - 'config/**/*'
    - 'test/**/*'
    - 'lib/tasks/**/*'

plugins:
  - rubocop-rake
  - rubocop-rspec

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  EnforcedStyle: always

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'lib/cgminer_manager/http_app.rb'

Metrics/MethodLength:
  Max: 25

Metrics/ClassLength:
  Max: 250

Metrics/AbcSize:
  Max: 25

RSpec/ExampleLength:
  Max: 20

RSpec/MultipleExpectations:
  Max: 5

RSpec/NestedGroups:
  Max: 4

RSpec/MessageChain:
  Enabled: false

RSpec/SpecFilePathFormat:
  Exclude:
    - 'spec/cgminer_manager/version_spec.rb'
